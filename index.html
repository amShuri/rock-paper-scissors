<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock, Paper, Scissors!</title>
</head>
<body>
    <header>
        <h1>ROCK PAPER SCISSORS</h1>
    </header>
    <div class="container">
        <div class="profile-one">
            <img src="" alt="User Profile" class="player-profile" width="235" height="195">
            <div class="button-container">
                <input type="button" id="rock" value="Rock" class="player-button">
                <input type="button" id="paper" value="Paper" class="player-button">
                <input type="button" id="scissors" value="Scissors" class="player-button">
            </div>
            <p id="player-victories" class="victories-counter">Victories: 0</p>
        </div>

        <div class="profile-two">
            <img src="" alt="Computer Profile" class="computer-profile" width="235" height="195">
            <div class="button-container">
                <input type="button" id="computer-rock" value="Rock" class="computer-button">
                <input type="button" id="computer-paper" value="Paper" class="computer-button">
                <input type="button" id="computer-scissors" value="Scissors" class="computer-button">
            </div>
            <p id="computer-victories" class="victories-counter">Victories: 0</p>
        </div>
    </div>

    <div class="keep-playing-holder">
        <input type="button" value="Keep Playing" class="keep-playing-btn hidden">
    </div>

    <div class="log-container">
        <p class="rule">The first player to score 5 points wins!</p>
        <div class="log-box">
            <p id="match-result"></p>
            <p id="player-score">Your Score: 0</p>
            <p id="computer-score">Opponent's Score: 0</p>
            <p id="tie-score">Total Ties: 0</p>        
        </div>
    </div>
    <footer class="license-credits">
        <div>Profile Pictures by <a href="https://www.freepik.com/free-vector/rock-paper-scissors-cartoon-banners-with-hands_24595967.htm#query=rock%20paper%20scissors&position=14&from_view=search&track=sph">upklyak on Freepik</a></div>

        <div>Hand Signs by <a href="https://www.freepik.com/free-vector/rock-paper-scissors-posters-with-palm-hands-fist-victory-symbol-vector-banners-hand-gesture-game-with-cartoon-illustration-human-arms-playing-gesturing-game_21050297.htm#query=rock%20paper%20scissors&position=0&from_view=search&track=sph">upklyak on Freepik</a></div>
        
        <div>Background Image by <a href="https://www.freepik.com/free-vector/gradient-galaxy-background_14658088.htm#query=galaxy&position=1&from_view=search&track=sph">Freepik on Freepik</a></div>
    </footer>
    <script src="main.js"></script>
</body>
</html>
