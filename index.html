<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock, Paper, Scissors!</title>
</head>
<body>
    <header>
        <h1>ROCK PAPER SCISSORS</h1>
    </header>
    <div class="container">
        <div class="profile-one">
            <img src="" alt="User Profile" class="player-profile" width="235" height="195">
            <div class="button-container">
                <input type="button" id="rock" value="Rock" class="player-button">
                <input type="button" id="paper" value="Paper" class="player-button">
                <input type="button" id="scissors" value="Scissors" class="player-button">
                <input type="button" value="Keep Playing" class="player-button hidden">
            </div>
            <p id="player-victories" class="victories">Victories: 0</p>
        </div>

        <div class="profile-two">
            <img src="" alt="Computer Profile" class="computer-profile" width="235" height="195">
            <div class="button-container">
                <input type="button" id="computer-rock" value="Rock" class="computer-button">
                <input type="button" id="computer-paper" value="Paper" class="computer-button">
                <input type="button" id="computer-scissors" value="Scissors" class="computer-button">
            </div>
            <p id="computer-victories" class="victories">Victories: 0</p>
        </div>
    </div>

    <div class="log-container">
        <p class="rule">The first player to score 5 points wins!</p>
        <div class="log-box">
            <p id="match-result">Winner: </p>
            <p id="player-score">Your Score: 0</p>
            <p id="computer-score">Opponent's Score: 0</p>
            <p id="tie-score">Total Ties: 0</p>        
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
